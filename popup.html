<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFill Pro</title>
  <style>
    /* Offline font fallback — replace with local font once downloaded */
    @font-face {
      font-family: 'PlusJakartaSans';
      src: local('Plus Jakarta Sans'), local('PlusJakartaSans'),
           url('fonts/PlusJakartaSans-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'PlusJakartaSans';
      src: local('Plus Jakarta Sans Medium'), local('PlusJakartaSans-Medium'),
           url('fonts/PlusJakartaSans-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'PlusJakartaSans';
      src: local('Plus Jakarta Sans SemiBold'), local('PlusJakartaSans-SemiBold'),
           url('fonts/PlusJakartaSans-SemiBold.ttf') format('truetype');
      font-weight: 600;
    }
    @font-face {
      font-family: 'PlusJakartaSans';
      src: local('Plus Jakarta Sans Bold'), local('PlusJakartaSans-Bold'),
           url('fonts/PlusJakartaSans-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Derived from the logo — warm, earthy, organic */
      --bg:          #0F0E0C;
      --surface:     #181510;
      --glass:       rgba(30, 26, 18, 0.75);
      --glass-border:rgba(255, 160, 50, 0.12);
      --glass-hover: rgba(255, 160, 50, 0.18);

      --primary:     #E8530A;   /* logo red-orange */
      --primary-low: rgba(232, 83, 10, 0.15);
      --primary-glow:rgba(232, 83, 10, 0.30);
      --orange:      #F5A219;   /* logo orange */
      --green:       #2BA82B;   /* logo green */
      --green-low:   rgba(43, 168, 43, 0.12);
      --green-glow:  rgba(43, 168, 43, 0.25);

      --text:        #F5F2EC;
      --text-sec:    #B0A898;
      --text-muted:  #6B6055;
      --border:      #2C2720;
      --border-hi:   #3D3428;

      --radius:    14px;
      --radius-sm: 9px;
      --radius-xs: 6px;

      --font: 'PlusJakartaSans', 'Plus Jakarta Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Header ───────────────────────────────── */
    .header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .logo-wrap {
      width: 36px; height: 36px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

    .logo-text { flex: 1; line-height: 1.2; }
    .logo-text strong {
      font-size: 14px; font-weight: 700; color: var(--text);
      letter-spacing: -0.3px; display: block;
    }
    .logo-text span { font-size: 10px; color: var(--text-muted); }

    .btn-icon-small {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--glass);
      color: var(--text-sec);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .btn-icon-small:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Profile Bar ─────────────────────────── */
    .profile-bar {
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(20, 17, 12, 0.6);
      display: flex; align-items: center; gap: 10px;
    }
    .profile-pill {
      display: flex; align-items: center; gap: 7px;
      flex: 1;
    }
    .profile-indicator {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px var(--primary);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .profile-meta { flex: 1; min-width: 0; }
    .profile-label { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px; }
    .profile-select {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      padding: 0;
      line-height: 1.3;
    }
    .profile-select option { background: #1E1A13; color: var(--text); }

    /* ── Body ────────────────────────────────── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── Status Card ─────────────────────────── */
    .status-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.3s, background 0.3s;
    }
    .status-card.detected {
      border-color: rgba(43,168,43,0.3);
      background: rgba(43,168,43,0.06);
    }
    .status-card.empty {
      border-color: rgba(180,140,80,0.2);
      background: rgba(180,140,80,0.04);
    }
    .status-card.restricted {
      border-color: rgba(200,80,60,0.2);
      background: rgba(200,80,60,0.04);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-muted);
      transition: all 0.3s;
    }
    .status-dot.scanning { background: var(--orange); animation: blink 1.2s ease infinite; }
    .status-dot.ok       { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.none     { background: var(--text-muted); }
    .status-dot.blocked  { background: var(--primary); }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }

    .status-text { font-size: 12px; color: var(--text-sec); }
    .status-text strong { color: var(--text); font-weight: 600; }

    /* ── Fill Button ─────────────────────────── */
    .fill-btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, var(--orange) 100%);
      color: #fff;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      box-shadow: 0 4px 20px var(--primary-glow);
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
      position: relative; overflow: hidden;
    }
    .fill-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
    }
    .fill-btn:hover  { transform: translateY(-1px); box-shadow: 0 7px 26px rgba(232,83,10,0.45); }
    .fill-btn:active { transform: translateY(0); }
    .fill-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .fill-btn.success { background: linear-gradient(135deg, var(--green) 0%, #3DC43D 100%); box-shadow: 0 4px 20px var(--green-glow); }
    .fill-btn svg { flex-shrink: 0; }

    /* ── Section Label ───────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 2px;
    }

    /* ── Toggles ─────────────────────────────── */
    .toggles {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row:hover { background: rgba(255,255,255,0.03); }
    .toggle-icon { flex-shrink: 0; opacity: 0.65; }
    .toggle-label-text { font-size: 12px; color: var(--text-sec); flex: 1; font-weight: 500; }

    .switch {
      position: relative; width: 38px; height: 21px; flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .track {
      position: absolute; inset: 0;
      background: var(--border-hi);
      border-radius: 21px;
      cursor: pointer;
      transition: background 0.22s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .track::after {
      content: '';
      position: absolute; top: 3px; left: 3px;
      width: 13px; height: 13px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.22s;
    }
    .switch input:checked + .track { background: var(--primary); border-color: transparent; }
    .switch input:checked + .track::after { transform: translateX(17px); background: #fff; }

    /* ── Dashboard Button ────────────────────── */
    .dash-btn {
      width: 100%;
      padding: 11px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-hi);
      background: rgba(30, 26, 18, 0.5);
      color: var(--text-sec);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.2s;
      text-align: left;
    }
    .dash-btn:hover { border-color: rgba(232,83,10,0.4); color: var(--text); background: rgba(232,83,10,0.06); }
    .dash-btn span.arrow { margin-left: auto; opacity: 0.4; font-size: 11px; }

    /* ── Shortcut Hint ────────────────────────── */
    .shortcut-hint {
      text-align: center; font-size: 10px;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    kbd {
      background: var(--glass);
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--font);
      font-size: 10px;
      color: var(--text-sec);
    }

    /* ── Footer ──────────────────────────────── */
    .footer {
      padding: 8px 18px 12px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .footer-text {
      font-size: 10px;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .footer-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--primary); opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-wrap">
      <img src="logo.png" alt="AutoFill Pro">
    </div>
    <div class="logo-text">
      <strong>AutoFill Pro</strong>
      <span>by Refora Technologies</span>
    </div>
    <button class="btn-icon-small" id="btn-refresh" title="Re-scan page">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <!-- Profile Bar -->
  <div class="profile-bar">
    <div class="profile-pill">
      <div class="profile-indicator" id="profile-indicator"></div>
      <div class="profile-meta">
        <div class="profile-label">ACTIVE PROFILE</div>
        <select class="profile-select" id="profile-select">
          <option>Loading…</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Status -->
    <div class="status-card" id="status-card">
      <div class="status-dot scanning" id="status-dot"></div>
      <div class="status-text" id="status-text">Scanning page…</div>
    </div>

    <!-- Fill Button -->
    <button class="fill-btn" id="btn-fill">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Fill This Page
    </button>

    <!-- Toggles -->
    <div class="section-label">Options</div>
    <div class="toggles">
      <div class="toggle-row">
        <span class="toggle-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </span>
        <span class="toggle-label-text">Auto-fill on page load</span>
        <label class="switch"><input type="checkbox" id="toggle-autofill-load"><span class="track"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </span>
        <span class="toggle-label-text">Auto-submit after fill</span>
        <label class="switch"><input type="checkbox" id="toggle-autosubmit"><span class="track"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
        <span class="toggle-label-text">Highlight fields before fill</span>
        <label class="switch"><input type="checkbox" id="toggle-highlight"><span class="track"></span></label>
      </div>
    </div>

    <!-- Dashboard -->
    <button class="dash-btn" id="btn-dashboard">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 3 12v1a10 10 0 1 0 10-11"/>
      </svg>
      Advanced Configuration
      <span class="arrow">→</span>
    </button>

    <!-- Shortcut -->
    <div class="shortcut-hint">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="4" width="20" height="16" rx="3"/><path d="M7 8h.01M12 8h.01M17 8h.01M7 12h.01M12 12h.01M17 12h.01M7 16h10"/>
      </svg>
      Quick fill: <kbd>Alt+Shift+F</kbd>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">
      <div class="footer-dot"></div>
      Refora Technologies · AutoFill Pro v2.0
    </div>
  </div>

  <script src="crypto-utils.js"></script>
  <script src="storage-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
